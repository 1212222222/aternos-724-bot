name: Aternos 7/24 Bot

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir otomatik tetikleme

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu GitHub sunucusuna çek
      uses: actions/checkout@v3

    - name: Node.js Ortamını Kur (Güncellendi)
      uses: actions/setup-node@v3
      with:
        node-version: '20' # <--- Google GenAI kütüphanesi için sürümü 20 yaptık knk!

    - name: Bot Kütüphanelerini Yükle
      run: npm install

    - name: Botu Ateşle ve 6 Saat Boyunca Kapatma
      run: |
        node bot.js &
        sleep 21600
