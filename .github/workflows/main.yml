name: Aternos 7/24 Bot

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 */4 * * *' # GitHub her 4 saatte bir botu uykudan uyandırıp otomatik olarak baştan çalıştıracak

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu GitHub sunucusuna çek
      uses: actions/checkout@v3

    - name: Node.js Ortamını Kur
      uses: actions/setup-node@v3
      with:
        node-level: '18'

    - name: Bot Kütüphanelerini Yükle
      run: npm install

    - name: Botu Ateşle ve 6 Saat Boyunca Kapatma
      run: |
        node bot.js &
        sleep 21600
