name: mc-ai-bot-runner

on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: mc-ai-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bağımlılıkları yükle
        run: npm install

      - name: List Available Models (Hata ayıklama için)
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Kullanılabilir modeller listeleniyor..."
          curl "https://generativelanguage.googleapis.com/v1beta/models?key=$API_KEY" | grep -o '"name": "models/[^"]*"'

      - name: Botu çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MC_HOST: ${{ secrets.MC_HOST }}
          MC_PORT: ${{ secrets.MC_PORT }}
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
        run: node index.js

      - name: Süre dolunca yeni job'u tetikle
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run mc-ai-bot-runner.yml --repo ${{ github.repository }} || true
